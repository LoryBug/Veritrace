name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/review-console/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install review console dependencies
        working-directory: app/review-console
        run: npm ci

      - name: Root validation suite
        run: npm test

      - name: Review console typecheck
        run: npm --prefix app/review-console run typecheck

      - name: Review console build
        run: npm --prefix app/review-console run build

      - name: Ast-grep lint
        run: npm run lint:ast-grep

      - name: Compile approved rules to AgentSpeak
        run: npm run compile

      - name: Ensure generated artifacts are committed
        run: git diff --exit-code -- agents/case_reasoner_generated.asl beliefs/approved_rules.asl beliefs/approved_rule_sources.asl

      - name: Live Jason MAS golden cases
        run: npm run test:mas

      - name: Check DSPy Python syntax
        run: python -m compileall llm-dspy/src

      - name: Install Playwright Chromium
        working-directory: app/review-console
        run: npx playwright install --with-deps chromium

      - name: Non-LLM Playwright smoke tests
        run: npm run test:e2e:smoke
