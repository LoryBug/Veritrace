id: no-hardcoded-secrets
language: TypeScript
severity: error
message: Do not hardcode secrets, API keys, or tokens. Use environment variables instead.
files:
  - app/review-console/server/**/*.ts
  - app/review-console/src/**/*.ts
  - app/review-console/src/**/*.tsx
rule:
  kind: program
  regex: (?i)(api.?key|api.?secret|password|token|auth|secret)\s*[:=]\s*['"][a-zA-Z0-9_\-]{16,}['"]
